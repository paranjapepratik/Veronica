name: Build Veronica Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller requests openpyxl biopython pillow
      - name: Build executable
        run: |
          pyinstaller --onefile --windowed \
            --name Veronica \
            --hidden-import Bio \
            --hidden-import Bio.Entrez \
            --hidden-import Bio.Medline \
            --hidden-import openpyxl \
            --hidden-import requests \
            veronica.py
      - name: Build deb
        run: |
          mkdir -p deb_package/usr/local/bin
          mkdir -p deb_package/usr/share/applications
          mkdir -p deb_package/usr/share/icons/hicolor/256x256/apps
          mkdir -p deb_package/DEBIAN
          cp dist/Veronica deb_package/usr/local/bin/veronica
          chmod +x deb_package/usr/local/bin/veronica
          cp veronica_icon.png deb_package/usr/share/icons/hicolor/256x256/apps/veronica.png
          cat > deb_package/DEBIAN/control << CTRL
          Package: veronica
          Version: 3.0
          Section: science
          Priority: optional
          Architecture: amd64
          Maintainer: Pratik Paranjape <paranjapepratik1@gmail.com>
          Homepage: https://github.com/paranjapepratik/Veronica
          Description: AI-Powered Literature Review Tool
           Searches PubMed, downloads PDFs, uses Ollama AI to score papers.
          CTRL
          cat > deb_package/usr/share/applications/veronica.desktop << DESK
          [Desktop Entry]
          Name=Veronica
          Comment=AI-Powered Literature Review Tool
          Exec=/usr/local/bin/veronica
          Icon=/usr/share/icons/hicolor/256x256/apps/veronica.png
          Terminal=false
          Type=Application
          Categories=Science;Education;
          DESK
          dpkg-deb --build --root-owner-group deb_package veronica_3.0_amd64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: veronica-linux
          path: veronica_3.0_amd64.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller requests openpyxl biopython pillow
      - name: Build Windows executable
        run: |
          pyinstaller --onefile --windowed `
            --name Veronica `
            --icon veronica_icon.ico `
            --hidden-import Bio `
            --hidden-import Bio.Entrez `
            --hidden-import Bio.Medline `
            --hidden-import openpyxl `
            --hidden-import requests `
            veronica.py
      - uses: actions/upload-artifact@v4
        with:
          name: veronica-windows
          path: dist\Veronica.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller requests openpyxl biopython pillow
      - name: Build macOS app
        run: |
          pyinstaller --onefile --windowed \
            --name Veronica \
            --icon veronica_icon.ico \
            --hidden-import Bio \
            --hidden-import Bio.Entrez \
            --hidden-import Bio.Medline \
            --hidden-import openpyxl \
            --hidden-import requests \
            veronica.py
      - name: Package as DMG
        run: |
          mkdir -p dmg_contents
          cp -r dist/Veronica.app dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create -volname "Veronica" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            Veronica_macOS.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: veronica-macos
          path: Veronica_macOS.dmg

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: veronica-linux
      - uses: actions/download-artifact@v4
        with:
          name: veronica-windows
      - uses: actions/download-artifact@v4
        with:
          name: veronica-macos
      - uses: softprops/action-gh-release@v2
        with:
          name: Veronica ${{ github.ref_name }}
          body: |
            ## Veronica ${{ github.ref_name }}

            | OS | File | Instructions |
            |----|------|-------------|
            | 🐧 Linux | `veronica_3.0_amd64.deb` | `sudo dpkg -i veronica_3.0_amd64.deb` |
            | 🪟 Windows | `Veronica.exe` | Double-click to run |
            | 🍎 macOS | `Veronica_macOS.dmg` | Open DMG → drag to Applications |

            ### Requirements:
            - Install [Ollama](https://ollama.com)
            - Run: `ollama pull llama3.1:8b`
          files: |
            veronica_3.0_amd64.deb
            Veronica.exe
            Veronica_macOS.dmg
